<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pacman</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-extras/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    .overlay {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      z-index: 10;
    }
    #ui { top: 10px; }
  </style>
</head>

<body>

<div id="ui" class="overlay">
  Score: <span id="score">0</span> |
  High Score: <span id="highscore">0</span> |
  Lives: <span id="lives">3</span>
</div>

<a-scene>

  <!-- SKY -->
  <a-sky color="blue"></a-sky>

  <!-- PLAYER -->
  <a-entity id="player"
            position="0 1.6 5"
            movement-controls="speed: 0.15">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- FLOOR -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="black"></a-plane>

  <!-- PELLETS -->
  <a-sphere class="pellet" position="0 0.5 -2" radius="0.1" color="yellow"></a-sphere>
  <a-sphere class="pellet" position="2 0.5 -3" radius="0.1" color="yellow"></a-sphere>

  <!-- POWER PELLET -->
  <a-sphere id="power" position="-2 0.5 -3"
            radius="0.2"
            color="orange"
            material="emissive: orange"></a-sphere>

  <!-- GHOST -->
  <a-box id="ghost"
         position="0 0.5 -5"
         color="red"></a-box>

</a-scene>

<script>
let score = 0;
let lives = 3;
let highScore = localStorage.getItem("highScore") || 0;

const scoreEl = document.getElementById("score");
const highScoreEl = document.getElementById("highscore");
const livesEl = document.getElementById("lives");

highScoreEl.innerText = highScore;

// UPDATE SCORE
function updateScore(points) {
  score += points;
  scoreEl.innerText = score;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
    highScoreEl.innerText = highScore;
  }
}

// LOSE LIFE
function loseLife() {
  lives--;
  livesEl.innerText = lives;

  if (lives <= 0) {
    alert("Game Over!");
    location.reload();
  }
}

// COLLISION CHECK
function distance(a, b) {
  return a.object3D.position.distanceTo(b.object3D.position);
}

AFRAME.registerComponent("game-loop", {
  tick: function () {
    const player = document.querySelector("#player");
    const pellets = document.querySelectorAll(".pellet");
    const ghost = document.querySelector("#ghost");
    const power = document.querySelector("#power");

    // PELLET COLLISION
    pellets.forEach(p => {
      if (p && distance(player, p) < 0.5) {
        p.parentNode.removeChild(p);
        updateScore(10);
      }
    });

    // POWER PELLET
    if (power && distance(player, power) < 0.7) {
      power.parentNode.removeChild(power);

      player.setAttribute("movement-controls", "speed", 0.4);

      setTimeout(() => {
        player.setAttribute("movement-controls", "speed", 0.15);
      }, 5000);
    }

    // GHOST AI (simple chase)
    if (ghost) {
      let dir = player.object3D.position.clone()
        .sub(ghost.object3D.position)
        .normalize();

      ghost.object3D.position.add(dir.multiplyScalar(0.02));

      // COLLISION WITH GHOST
      if (distance(player, ghost) < 0.7) {
        loseLife();
        ghost.object3D.position.set(0, 0.5, -5);
      }
    }
  }
});

// ATTACH GAME LOOP
document.querySelector("a-scene").setAttribute("game-loop", "");

</script>

</body>
</html>
