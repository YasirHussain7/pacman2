<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pacman WebVR</title>

  <!-- REQUIRED LIBS -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-extras/dist/aframe-extras.min.js"></script>

  <!-- YOUR BUNDLE -->
  <script src="dist/bundle.js"></script>

  <link rel="stylesheet" href="index.css">
</head>

<body>

<!-- UI -->
<div id="scoreUI" style="position:absolute; top:10px; left:10px; color:white;">
  Score: <span id="score">0</span><br>
  High Score: <span id="highscore">0</span><br>
  Lives: <span id="lives">3</span>
</div>

<a-scene>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="navmesh" src="assets/models/navmesh.gltf"></a-asset-item>
    <a-asset-item id="ghost" src="assets/models/ghost.gltf"></a-asset-item>
    <a-asset-item id="maze" src="assets/models/maze.gltf"></a-asset-item>
    <img id="life" src="assets/images/pacman.png">
  </a-assets>

  <!-- PLAYER -->
  <a-entity id="player"
            movement-controls="constrainToNavMesh: true; speed: 0.7"
            position="0 0 4"
            nav-agent="speed: 0.7">
    
    <a-camera position="0 1 0"
              wasd-controls="enabled: true"
              look-controls="enabled: true">
    </a-camera>

    <a-sphere color="yellow"
              radius="0.4"
              position="0 0.5 0.05">
    </a-sphere>

  </a-entity>

  <!-- NAVMESH -->
  <a-entity nav-mesh visible="false" gltf-model="#navmesh"></a-entity>

  <!-- GHOSTS -->
  <a-gltf-model class="ghost" gltf-model="#ghost" position="0 0 -2"></a-gltf-model>
  <a-gltf-model class="ghost" gltf-model="#ghost" position="-1 0 -1"></a-gltf-model>
  <a-gltf-model class="ghost" gltf-model="#ghost" position="1 0 -1"></a-gltf-model>

  <!-- MAZE -->
  <a-gltf-model scale="1 1.6 1" gltf-model="#maze"></a-gltf-model>

  <a-plane rotation="-90 0 0" width="15" height="16" color="black"></a-plane>
  <a-sky color="blue"></a-sky>

</a-scene>

<script>
// =====================
// GAME STATE
// =====================
let score = 0;
let lives = 3;
let highScore = localStorage.getItem("highScore") || 0;

const scoreEl = document.getElementById("score");
const highScoreEl = document.getElementById("highscore");
const livesEl = document.getElementById("lives");

highScoreEl.innerText = highScore;

// =====================
// SCORE SYSTEM
// =====================
function addScore(points) {
  score += points;
  scoreEl.innerText = score;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
    highScoreEl.innerText = highScore;
  }
}

// =====================
// LIVES SYSTEM
// =====================
function loseLife() {
  lives--;
  livesEl.innerText = lives;

  if (lives <= 0) {
    alert("Game Over");
    location.reload();
  }
}

// =====================
// DISTANCE HELPER
// =====================
function dist(a, b) {
  return a.object3D.position.distanceTo(b.object3D.position);
}

// =====================
// MAIN LOOP
// =====================
AFRAME.registerComponent("game-loop", {
  tick: function () {
    const player = document.querySelector("#player");
    const ghosts = document.querySelectorAll(".ghost");

    ghosts.forEach(g => {
      // SIMPLE PROXIMITY AI
      let d = dist(player, g);

      if (d < 5) {
        let dir = player.object3D.position.clone()
          .sub(g.object3D.position)
          .normalize();

        g.object3D.position.add(dir.multiplyScalar(0.02));
      }

      // COLLISION
      if (d < 0.8) {
        loseLife();
        g.object3D.position.set(0, 0, -2);
      }
    });
  }
});

document.querySelector("a-scene").setAttribute("game-loop", "");

// =====================
// POWER PELLET HOOK
// =====================
// Call this from your bundle.js when pellet eaten
window.activateSpeedBoost = function () {
  const player = document.querySelector("#player");

  player.setAttribute("nav-agent", "speed", 1.5);

  setTimeout(() => {
    player.setAttribute("nav-agent", "speed", 0.7);
  }, 5000);
};

</script>

</body>
</html>
